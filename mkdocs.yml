site_name: fgeo
site_url: https://lijma.github.io/agent-skill-fgeo/
site_description: Generative Engine Optimization CLI for AI-assisted go-to-market content systems.
site_author: Marvin Li
repo_url: https://github.com/lijma/agent-skill-fgeo
repo_name: lijma/agent-skill-fgeo

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid-zoom

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lijma/agent-skill-fgeo
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fgeo/

nav:
  - Home:
      - Overview: index.md
      - Getting Started: getting-started.md
      - Core Concepts: concepts.md
      - Agent Integrations: agents.md
  - Workflows:
      - GTM Workflow: workflows/gtm.md
      - Publishing: workflows/publishing.md
  - Reference:
      - Commands: commands.md
      - Release Process: release.md
  - Contributing: contributing.md

